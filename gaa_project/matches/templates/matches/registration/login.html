<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h2>Login to GAA App</h2>

    {% if form.errors %}
        <p style="color:red;">Invalid username or password</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        
        <label>Username:</label>
        {{ form.username }}

        <br><br>

        <label>Password:</label>
        {{ form.password }}

        <br><br>

        <button type="submit">Login</button>
    </form>
</body>
</html>
